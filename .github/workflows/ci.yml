name: ETL DataOps CI

on:
  push:
    branches: [main, develop]

  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15

        env:
          POSTGRES_DB: warehouse
          POSTGRES_USER: etl_user
          POSTGRES_PASSWORD: etl_secret

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://etl_user:etl_secret@localhost:5432/warehouse

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5

        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tests unitaires pandas (sans base de données)
        run: pytest -v tests/test_transforms.py

      - name: Tests intégration PostgreSQL
        run: pytest -v tests/test_load.py